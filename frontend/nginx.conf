server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Dette er magien: Hvis stien ikke finnes som en fil, 
        # server index.html og la React Router fikse resten.
        try_files $uri $uri/ /index.html;
    }

    # Valgfritt: Cache-kontroll for statiske filer (bilder/js/css)
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
    }
}